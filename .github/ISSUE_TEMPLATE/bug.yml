name: Bug report
description: Something is broken or behaves unexpectedly
labels: [bug]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.

        **If this is a security issue, do not open a public issue.** See [SECURITY.md](../SECURITY.md).
  - type: input
    id: version
    attributes:
      label: Version
      description: Output of `llms --version`
      placeholder: llms 0.2.0
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      description: OS + arch
      placeholder: macOS 14 arm64 / Ubuntu 24.04 x86_64
    validations:
      required: true
  - type: textarea
    id: what-happened
    attributes:
      label: What happened
      description: What did you do, what did you expect, what actually happened?
    validations:
      required: true
  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal commands that reproduce the issue
      render: shell
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      render: shell
